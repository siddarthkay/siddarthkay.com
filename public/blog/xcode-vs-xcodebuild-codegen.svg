<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 20 800 780" preserveAspectRatio="xMidYMid meet" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a2744"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf222e"/>
    </marker>
  </defs>

  <rect width="900" height="800" fill="#f5f2ed"/>

  <!-- Title -->
  <text x="450" y="48" font-family="'Newsreader', Georgia, serif" font-size="28" font-style="italic" fill="#1a2744" text-anchor="middle">Two Environments, One Missing Variable</text>
  <line x1="310" y1="64" x2="590" y2="64" stroke="#d4702a" stroke-width="1.5"/>
  <text x="450" y="86" font-size="12" fill="#6b7280" text-anchor="middle" letter-spacing="2.5">XCODE.APP vs xcodebuild CLI · REACT NATIVE CODEGEN</text>

  <!-- ===================== LEFT PANEL: Xcode.app ===================== -->
  <rect x="80" y="110" width="360" height="560" fill="none" stroke="#1a2744" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="80" y="110" width="360" height="62" fill="#1a2744"/>
  <text x="100" y="138" font-size="11" fill="#d4702a" letter-spacing="2">GUI BUILD</text>
  <text x="100" y="160" font-size="18" fill="#f5f2ed" font-weight="600">Xcode.app</text>
  <text x="420" y="138" font-size="11" fill="#f5f2ed" text-anchor="end" opacity="0.55">open + ⌘B</text>
  <text x="420" y="160" font-size="11" fill="#f5f2ed" text-anchor="end" opacity="0.7">works</text>

  <!-- Env vars section -->
  <text x="100" y="198" font-size="11" fill="#d4702a" letter-spacing="1.5">BUILD ENVIRONMENT</text>
  <rect x="100" y="208" width="320" height="76" fill="none" stroke="#1a2744" stroke-width="1" opacity="0.4"/>
  <text x="114" y="230" font-size="12" fill="#1c1c1c">ACTION             = "build"</text>
  <text x="114" y="248" font-size="12" fill="#1c1c1c">CONFIGURATION      = "Debug"</text>
  <text x="114" y="266" font-size="13" fill="#1a7f37" font-weight="600">USE_CODEGEN_DISCOVERY = "1"  ✓</text>

  <!-- Arrow -->
  <line x1="260" y1="292" x2="260" y2="318" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gate -->
  <rect x="100" y="326" width="320" height="56" fill="none" stroke="#1a2744" stroke-width="1"/>
  <text x="114" y="346" font-size="11" fill="#d4702a" letter-spacing="1.5">CODEGEN GATE</text>
  <text x="114" y="368" font-size="12" fill="#1c1c1c">if env["USE_CODEGEN_DISCOVERY"] == "1"</text>
  <text x="260" y="378" font-size="11" fill="#1a7f37" text-anchor="middle" font-weight="600">→ run generate-artifacts.js</text>

  <!-- Arrow -->
  <line x1="260" y1="382" x2="260" y2="410" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Generated files -->
  <text x="100" y="426" font-size="11" fill="#d4702a" letter-spacing="1.5">GENERATED FILES</text>
  <rect x="100" y="436" width="320" height="96" fill="none" stroke="#1a2744" stroke-width="1" opacity="0.4"/>
  <text x="114" y="456" font-size="11" fill="#6b7280">ios/build/generated/ios/FBReactNativeSpec/</text>
  <text x="114" y="478" font-size="12" fill="#1c1c1c">FBReactNativeSpec.h</text>
  <text x="406" y="478" font-size="11" fill="#1a7f37" text-anchor="end" font-weight="600">4.3 KB</text>
  <text x="114" y="498" font-size="12" fill="#1c1c1c">FBReactNativeSpec-generated.mm</text>
  <text x="406" y="498" font-size="11" fill="#1a7f37" text-anchor="end" font-weight="600">12 KB</text>
  <text x="114" y="520" font-size="11" fill="#1a7f37">contains @protocol NativeAnimatedModuleSpec</text>

  <!-- Arrow -->
  <line x1="260" y1="532" x2="260" y2="560" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcome -->
  <rect x="100" y="568" width="320" height="78" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="114" y="590" font-size="11" fill="#1a7f37" letter-spacing="1.5" font-weight="600">BUILD · SUCCEEDED</text>
  <line x1="114" y1="598" x2="250" y2="598" stroke="#1a7f37" stroke-width="0.5" opacity="0.4"/>
  <text x="114" y="618" font-size="12" fill="#1a7f37">all protocols resolved</text>
  <text x="114" y="636" font-size="12" fill="#1a7f37">TurboModule types compile</text>

  <!-- ===================== RIGHT PANEL: xcodebuild CLI ===================== -->
  <rect x="460" y="110" width="360" height="560" fill="none" stroke="#cf222e" stroke-width="2"/>

  <!-- Header band -->
  <rect x="460" y="110" width="360" height="62" fill="#1a2744"/>
  <text x="480" y="138" font-size="11" fill="#d4702a" letter-spacing="2">CI / TERMINAL</text>
  <text x="480" y="160" font-size="18" fill="#f5f2ed" font-weight="600">xcodebuild</text>
  <text x="800" y="138" font-size="11" fill="#f5f2ed" text-anchor="end" opacity="0.55">make run-ios · CI</text>
  <text x="800" y="160" font-size="11" fill="#f5f2ed" text-anchor="end" opacity="0.7">broken for 6 months</text>

  <!-- Env vars section -->
  <text x="480" y="198" font-size="11" fill="#d4702a" letter-spacing="1.5">BUILD ENVIRONMENT</text>
  <rect x="480" y="208" width="320" height="76" fill="none" stroke="#1a2744" stroke-width="1" opacity="0.4"/>
  <text x="494" y="230" font-size="12" fill="#1c1c1c">ACTION             = "build"</text>
  <text x="494" y="248" font-size="12" fill="#1c1c1c">CONFIGURATION      = "Debug"</text>
  <text x="494" y="266" font-size="13" fill="#cf222e" font-weight="600">USE_CODEGEN_DISCOVERY = (unset)  ✗</text>

  <!-- Arrow -->
  <line x1="640" y1="292" x2="640" y2="318" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Gate -->
  <rect x="480" y="326" width="320" height="56" fill="none" stroke="#cf222e" stroke-width="1"/>
  <text x="494" y="346" font-size="11" fill="#d4702a" letter-spacing="1.5">CODEGEN GATE</text>
  <text x="494" y="368" font-size="12" fill="#1c1c1c">if env["USE_CODEGEN_DISCOVERY"] == "1"</text>
  <text x="640" y="378" font-size="11" fill="#cf222e" text-anchor="middle" font-weight="600">→ skip (gate closed)</text>

  <!-- Arrow -->
  <line x1="640" y1="382" x2="640" y2="410" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Generated files -->
  <text x="480" y="426" font-size="11" fill="#d4702a" letter-spacing="1.5">GENERATED FILES</text>
  <rect x="480" y="436" width="320" height="96" fill="none" stroke="#cf222e" stroke-width="1" opacity="0.6"/>
  <text x="494" y="456" font-size="11" fill="#6b7280">ios/build/generated/ios/FBReactNativeSpec/</text>
  <text x="494" y="478" font-size="12" fill="#1c1c1c">FBReactNativeSpec.h</text>
  <text x="786" y="478" font-size="11" fill="#cf222e" text-anchor="end" font-weight="600">0 bytes</text>
  <text x="494" y="498" font-size="12" fill="#1c1c1c">FBReactNativeSpec-generated.mm</text>
  <text x="786" y="498" font-size="11" fill="#cf222e" text-anchor="end" font-weight="600">0 bytes</text>
  <text x="494" y="520" font-size="11" fill="#cf222e">files exist but were never populated</text>

  <!-- Arrow -->
  <line x1="640" y1="532" x2="640" y2="560" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Outcome -->
  <rect x="460" y="568" width="360" height="78" fill="#ffebe9" stroke="#cf222e" stroke-width="1.5"/>
  <text x="474" y="590" font-size="11" fill="#cf222e" letter-spacing="1.5" font-weight="600">BUILD · FAILED</text>
  <line x1="474" y1="598" x2="590" y2="598" stroke="#cf222e" stroke-width="0.5" opacity="0.4"/>
  <text x="474" y="616" font-size="11" fill="#cf222e">Cannot find protocol declaration for</text>
  <text x="474" y="632" font-size="11" fill="#cf222e">'NativeAnimatedModuleSpec'</text>

  <!-- ===================== FIX BANNER ===================== -->
  <rect x="80" y="692" width="740" height="68" fill="#1a2744"/>
  <text x="100" y="716" font-size="11" fill="#d4702a" letter-spacing="2">THE FIX  ·  Podfile  ·  1 line</text>
  <line x1="100" y1="724" x2="260" y2="724" stroke="#d4702a" stroke-width="0.5" opacity="0.5"/>
  <text x="100" y="746" font-size="14" fill="#f5f2ed"><tspan fill="#d4702a">ENV</tspan>[<tspan fill="#dafbe1">'USE_CODEGEN_DISCOVERY'</tspan>] = <tspan fill="#dafbe1">"1"</tspan>  <tspan fill="#f5f2ed" opacity="0.55">  →  closes the environment gap · 6 months, solved</tspan></text>
</svg>
