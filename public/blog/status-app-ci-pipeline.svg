<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 20 800 700" preserveAspectRatio="xMidYMid meet" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a2744"/>
    </marker>
  </defs>

  <rect width="900" height="720" fill="#f5f2ed"/>

  <!-- Title -->
  <text x="450" y="48" font-family="'Newsreader', Georgia, serif" font-size="28" font-style="italic" fill="#1a2744" text-anchor="middle">Status App Mobile CI</text>
  <line x1="340" y1="64" x2="560" y2="64" stroke="#d4702a" stroke-width="1.5"/>
  <text x="450" y="86" font-size="12" fill="#6b7280" text-anchor="middle" letter-spacing="2.5">JENKINS · DOCKER · FASTLANE · SIX PLATFORMS</text>

  <!-- Jenkins outer frame -->
  <rect x="78" y="110" width="744" height="560" fill="none" stroke="#d4702a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="100" y="102" width="260" height="16" fill="#f5f2ed"/>
  <text x="112" y="115" font-size="12" fill="#d4702a" letter-spacing="2">JENKINS CI INFRASTRUCTURE</text>
  <rect x="540" y="102" width="280" height="16" fill="#f5f2ed"/>
  <text x="812" y="115" font-size="11" fill="#6b7280" letter-spacing="1" text-anchor="end">Docker images · bare-metal macOS</text>

  <!-- Trigger box -->
  <rect x="370" y="146" width="160" height="48" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <text x="450" y="168" font-size="14" fill="#1a2744" text-anchor="middle" font-weight="600">Git trigger</text>
  <text x="450" y="186" font-size="11" fill="#6b7280" text-anchor="middle">PR · push · tag</text>

  <!-- Fork lines -->
  <line x1="450" y1="194" x2="450" y2="220" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="250" y1="220" x2="650" y2="220" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="250" y1="220" x2="250" y2="250" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="650" y1="220" x2="650" y2="250" stroke="#1a2744" stroke-width="1.5"/>

  <!-- PR pill -->
  <rect x="200" y="250" width="100" height="34" fill="#1a2744"/>
  <text x="250" y="272" font-size="14" fill="#f5f2ed" text-anchor="middle" font-weight="600">PR</text>

  <!-- Release pill -->
  <rect x="510" y="250" width="280" height="34" fill="none" stroke="#1a2744" stroke-width="1.5" transform="translate(0,0)"/>
  <text x="650" y="272" font-size="14" fill="#1a2744" text-anchor="middle" font-weight="600">NIGHTLY / RELEASE</text>

  <!-- Down arrows to lanes -->
  <line x1="250" y1="284" x2="250" y2="322" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="284" x2="650" y2="322" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ PR LANE ============ -->
  <rect x="100" y="332" width="300" height="168" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <text x="116" y="354" font-size="11" fill="#d4702a" letter-spacing="2">EVERY PR</text>
  <text x="384" y="354" font-size="10" fill="#6b7280" text-anchor="end">3 artifacts</text>
  <line x1="116" y1="362" x2="384" y2="362" stroke="#1a2744" stroke-width="0.5" opacity="0.3"/>

  <text x="116" y="388" font-size="13" fill="#1a2744" font-weight="600">Linux AppImage</text>

  <text x="116" y="418" font-size="13" fill="#1a2744" font-weight="600">Android APK</text>
  <text x="116" y="434" font-size="11" fill="#6b7280">app.status.mobile.pr</text>

  <text x="116" y="464" font-size="13" fill="#1a2744" font-weight="600">iOS IPA</text>
  <text x="116" y="480" font-size="11" fill="#6b7280">app.status.mobile.pr  ·  Fastlane match</text>

  <!-- ============ RELEASE LANE ============ -->
  <rect x="500" y="332" width="300" height="258" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <text x="516" y="354" font-size="11" fill="#d4702a" letter-spacing="2">NIGHTLY / RELEASE</text>
  <text x="784" y="354" font-size="10" fill="#6b7280" text-anchor="end">6 artifacts</text>
  <line x1="516" y1="362" x2="784" y2="362" stroke="#1a2744" stroke-width="0.5" opacity="0.3"/>

  <text x="516" y="386" font-size="13" fill="#1a2744" font-weight="600">Linux AppImage</text>

  <text x="516" y="412" font-size="13" fill="#1a2744" font-weight="600">Android AAB</text>
  <text x="516" y="426" font-size="11" fill="#6b7280">app.status.mobile  ·  jarsigner</text>

  <text x="516" y="452" font-size="13" fill="#1a2744" font-weight="600">iOS IPA</text>
  <text x="516" y="466" font-size="11" fill="#6b7280">app.status.mobile  ·  altool + JWT</text>

  <text x="516" y="492" font-size="13" fill="#1a2744" font-weight="600">F-Droid APK</text>
  <text x="516" y="506" font-size="11" fill="#6b7280">built from source · Docker-in-Docker</text>

  <text x="516" y="532" font-size="13" fill="#1a2744" font-weight="600">macOS DMG</text>

  <text x="516" y="558" font-size="13" fill="#1a2744" font-weight="600">Windows installer</text>

  <!-- Arrows to distribution -->
  <line x1="250" y1="500" x2="250" y2="602" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="590" x2="650" y2="602" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ DISTRIBUTION ============ -->
  <!-- PR distribution -->
  <rect x="100" y="612" width="300" height="44" fill="#1a2744"/>
  <text x="116" y="634" font-size="14" fill="#f5f2ed" font-weight="600">DIAWI</text>
  <text x="186" y="634" font-size="11" fill="#f5f2ed" opacity="0.6">shared staging distribution</text>

  <!-- Release distribution -->
  <rect x="500" y="612" width="300" height="44" fill="#1a2744"/>
  <text x="516" y="632" font-size="11" fill="#d4702a" letter-spacing="1">DISTRIBUTION</text>
  <text x="516" y="648" font-size="11" fill="#f5f2ed">Play · TestFlight · F-Droid · releases</text>
</svg>
