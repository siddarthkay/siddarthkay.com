<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 20 800 820" preserveAspectRatio="xMidYMid meet" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a2744"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf222e"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#ffebe9"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#cf222e" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="900" height="840" fill="#f5f2ed"/>

  <!-- Title -->
  <text x="450" y="48" font-family="'Newsreader', Georgia, serif" font-size="28" font-style="italic" fill="#1a2744" text-anchor="middle">The SIGSYS Call Chain</text>
  <line x1="342" y1="64" x2="558" y2="64" stroke="#d4702a" stroke-width="1.5"/>
  <text x="450" y="86" font-size="12" fill="#6b7280" text-anchor="middle" letter-spacing="2.5">x86_64 · ANDROID 11+ · SYSCALL 232</text>

  <!-- ===================== 1. USER ===================== -->
  <rect x="160" y="118" width="580" height="46" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <rect x="160" y="118" width="78" height="46" fill="#1a2744"/>
  <text x="199" y="147" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">USER</text>
  <text x="256" y="141" font-size="14" fill="#1a2744" font-weight="600">tap "Confirm Password"</text>
  <text x="256" y="158" font-size="11" fill="#6b7280">Generating Keys screen appears</text>
  <line x1="450" y1="164" x2="450" y2="186" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== 2. JS/TS ===================== -->
  <rect x="160" y="188" width="580" height="46" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <rect x="160" y="188" width="78" height="46" fill="#d4702a"/>
  <text x="199" y="217" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">TS/JS</text>
  <text x="256" y="211" font-size="14" fill="#1a2744" font-weight="600">React Native event dispatch</text>
  <text x="256" y="228" font-size="11" fill="#6b7280">RN legacy bridge · serialize + queue</text>
  <line x1="450" y1="234" x2="450" y2="256" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== 3. CLJS ===================== -->
  <rect x="160" y="258" width="580" height="46" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <rect x="160" y="258" width="78" height="46" fill="#d4702a"/>
  <text x="199" y="287" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">CLJS</text>
  <text x="256" y="281" font-size="14" fill="#1a2744" font-weight="600">re-frame event handler</text>
  <text x="256" y="298" font-size="11" fill="#6b7280">calls into native module</text>
  <line x1="450" y1="304" x2="450" y2="326" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== 4. JAVA / JNI ===================== -->
  <rect x="160" y="328" width="580" height="46" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <rect x="160" y="328" width="78" height="46" fill="#1a2744"/>
  <text x="199" y="357" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">JAVA</text>
  <text x="256" y="351" font-size="14" fill="#1a2744" font-weight="600">StatusModule.createAccountAndLogin()</text>
  <text x="256" y="368" font-size="11" fill="#6b7280">JNI bridge to gomobile</text>
  <line x1="450" y1="374" x2="450" y2="396" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== 5. GO (status-go) ===================== -->
  <rect x="160" y="398" width="580" height="46" fill="none" stroke="#1a2744" stroke-width="1.5"/>
  <rect x="160" y="398" width="78" height="46" fill="#1a2744"/>
  <text x="199" y="427" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">GO</text>
  <text x="256" y="421" font-size="14" fill="#1a2744" font-weight="600">status-go · g.store(childAccount, password)</text>
  <text x="256" y="438" font-size="11" fill="#6b7280">account/generator/generator.go</text>
  <line x1="450" y1="444" x2="450" y2="466" stroke="#1a2744" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== 6. GO LIBS (highlighted) ===================== -->
  <rect x="160" y="468" width="580" height="70" fill="none" stroke="#d4702a" stroke-width="2"/>
  <rect x="160" y="468" width="78" height="70" fill="#d4702a"/>
  <text x="199" y="496" font-size="11" fill="#f5f2ed" text-anchor="middle" letter-spacing="1" font-weight="600">GO LIB</text>
  <text x="199" y="512" font-size="10" fill="#f5f2ed" text-anchor="middle" opacity="0.85">root cause</text>
  <text x="256" y="491" font-size="14" fill="#1a2744" font-weight="600">notify  ·  tcp-shaker</text>
  <text x="256" y="509" font-size="12" fill="#1a2744">syscall.Syscall6(SYS_EPOLL_WAIT, fd, ...)</text>
  <text x="256" y="527" font-size="11" fill="#6b7280">bypasses Go stdlib netpoller · raw syscall 232</text>
  <line x1="450" y1="538" x2="450" y2="570" stroke="#cf222e" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-red)"/>

  <!-- ===================== SECCOMP WALL ===================== -->
  <rect x="120" y="578" width="660" height="38" fill="url(#hatch)" stroke="#cf222e" stroke-width="1.5"/>
  <text x="134" y="602" font-size="12" fill="#cf222e" letter-spacing="2" font-weight="700">ANDROID SECCOMP FILTER</text>
  <text x="766" y="602" font-size="11" fill="#cf222e" text-anchor="end">syscall 232 (epoll_wait)  ·  BLOCKED on x86_64</text>

  <!-- ===================== CRASH ===================== -->
  <rect x="160" y="640" width="580" height="68" fill="#cf222e"/>
  <text x="178" y="666" font-size="11" fill="#ffebe9" letter-spacing="2" font-weight="700">SIGSYS  ·  signal 31  ·  code SYS_SECCOMP</text>
  <line x1="178" y1="674" x2="420" y2="674" stroke="#ffebe9" stroke-width="0.5" opacity="0.5"/>
  <text x="178" y="694" font-size="14" fill="#ffebe9" font-weight="600">process killed  ·  no stack trace  ·  no dialog</text>

  <!-- Footnote -->
  <line x1="160" y1="730" x2="740" y2="730" stroke="#1a2744" stroke-width="0.5" opacity="0.2"/>
  <text x="160" y="750" font-size="11" fill="#6b7280" letter-spacing="1">THE ALLOWED PATH</text>
  <text x="160" y="768" font-size="12" fill="#1a2744">Go stdlib netpoller  →  epoll_pwait (syscall 281)  ·  allowed by seccomp</text>
  <text x="160" y="786" font-size="11" fill="#6b7280">Fix: fork libs, swap epoll_wait for polling loop under <tspan font-family="'JetBrains Mono', monospace" fill="#1a2744">//go:build android &amp;&amp; amd64</tspan></text>
</svg>
